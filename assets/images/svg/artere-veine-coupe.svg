<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="title5 desc5">
  <title id="title5">مقارنة بين مقطع شريان ومقطع وريد</title>
  <desc id="desc5">مخطط لمقطعين عرضيين يقارنان سمك جدار الشريان وجدار الوريد، مع الإشارة إلى وجود صمامات في الوريد.</desc>
  <rect x="0" y="0" width="800" height="380" fill="#F9FAF7" />

  <!-- الشريان -->
  <text x="220" y="55" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="20" font-weight="bold" fill="#8B4A2B" data-lang="ar">الشريان</text>
  <text x="220" y="55" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="bold" fill="#8B4A2B" data-lang="fr">Artère</text>
  <circle cx="220" cy="180" r="95" fill="#8B4A2B" />
  <circle cx="220" cy="180" r="60" fill="#F9FAF7" />
  <circle cx="220" cy="180" r="60" fill="#C17A2E" opacity="0.35" />
  <text x="220" y="185" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="13" fill="#1B241F" data-lang="ar">تجويف</text>
  <text x="220" y="185" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#1B241F" data-lang="fr">Lumière</text>
  <path d="M220 85 L220 60" stroke="#1B241F" stroke-width="2" marker-end="url(#dot1)" />
  <text x="330" y="120" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#1B241F" data-lang="ar">جدار سميك ومرن</text>
  <text x="330" y="120" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#1B241F" data-lang="fr">Paroi épaisse et élastique</text>
  <text x="220" y="300" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#1B241F" data-lang="ar">ينقل الدم من القلب إلى الأعضاء</text>
  <text x="220" y="300" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#1B241F" data-lang="fr">Transporte le sang du cœur vers les organes</text>

  <!-- خط فاصل -->
  <line x1="420" y1="60" x2="420" y2="330" stroke="#DADDD5" stroke-width="2" />

  <!-- الوريد -->
  <text x="600" y="55" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="20" font-weight="bold" fill="#3B6E8F" data-lang="ar">الوريد</text>
  <text x="600" y="55" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="bold" fill="#3B6E8F" data-lang="fr">Veine</text>
  <circle cx="600" cy="180" r="90" fill="#3B6E8F" />
  <circle cx="600" cy="180" r="70" fill="#F9FAF7" />
  <circle cx="600" cy="180" r="70" fill="#3C7A63" opacity="0.25" />
  <!-- صمام -->
  <path d="M570 180 Q600 155 630 180 Q600 200 570 180 Z" fill="none" stroke="#204F3F" stroke-width="3" />
  <text x="600" y="185" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="12" fill="#1B241F" data-lang="ar">صمام</text>
  <text x="600" y="185" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#1B241F" data-lang="fr">Valvule</text>
  <text x="710" y="120" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#1B241F" data-lang="ar">جدار رقيق ويحتوي صمامات</text>
  <text x="710" y="120" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#1B241F" data-lang="fr">Paroi fine avec valvules</text>
  <text x="600" y="300" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#1B241F" data-lang="ar">يعيد الدم من الأعضاء إلى القلب</text>
  <text x="600" y="300" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#1B241F" data-lang="fr">Ramène le sang des organes vers le cœur</text>

  <defs>
    <marker id="dot1" markerWidth="1" markerHeight="1"><circle cx="0" cy="0" r="0" /></marker>
  </defs>
</svg>

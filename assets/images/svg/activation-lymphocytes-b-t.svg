<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="title5 desc5">
  <title id="title5">مسارا الاستجابة المناعية النوعية: الخِلطية والخلوية</title>
  <desc id="desc5">مخطط يوضح انطلاقا من مولد الضد مسارين: تحول اللمفاويات البائية إلى مصورات دم تفرز أجساما مضادة (استجابة خلطية)، وتحول اللمفاويات التائية القاتلة إلى خلايا تائية سامة تدمر الخلايا المصابة (استجابة خلوية).</desc>
  <rect x="0" y="0" width="800" height="380" fill="#F9FAF7" />

  <text x="400" y="30" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#204F3F" data-lang="ar">مساري الاستجابة المناعية النوعية</text>
  <text x="400" y="30" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#204F3F" data-lang="fr">Les deux voies de la réponse immunitaire spécifique</text>

  <!-- Antigen centre -->
  <path d="M400 75 q-14 -22 10 -30 q18 4 14 28 z" fill="#C17A2E" stroke="#8B4A2B" stroke-width="2" />
  <text x="400 " y="52" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="12" fill="#8B4A2B" data-lang="ar">مولد الضد</text>
  <text x="400" y="52" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#8B4A2B" data-lang="fr">Antigène</text>

  <!-- Arrows to LB and LT -->
  <path d="M375 90 Q 260 130 220 160" stroke="#3B6E8F" stroke-width="3" fill="none" marker-end="url(#arrowL)" />
  <path d="M425 90 Q 540 130 580 160" stroke="#3B6E8F" stroke-width="3" fill="none" marker-end="url(#arrowL)" />
  <defs>
    <marker id="arrowL" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#3B6E8F" />
    </marker>
  </defs>

  <!-- Left branch: LB -->
  <text x="200" y="120" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#204F3F" data-lang="ar">الاستجابة الخِلطية</text>
  <text x="200" y="120" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#204F3F" data-lang="fr">Réponse humorale</text>

  <circle cx="200" cy="185" r="30" fill="#E3E8D6" stroke="#204F3F" stroke-width="2.5" />
  <text x="200" y="230" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="12" fill="#1B241F" data-lang="ar">لمفاوية بائية (LB)</text>
  <text x="200" y="230" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#1B241F" data-lang="fr">Lymphocyte B</text>

  <path d="M200 215 L200 255" stroke="#3B6E8F" stroke-width="2.5" marker-end="url(#arrowL)" />
  <text x="250" y="240" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#3B6E8F" data-lang="ar">تكاثر وتمايز</text>
  <text x="250" y="240" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#3B6E8F" data-lang="fr">Prolifération</text>

  <circle cx="200" cy="290" r="36" fill="#DCE9E1" stroke="#3C8A6D" stroke-width="2.5" />
  <path d="M182 275 h36 M182 285 h36 M182 295 h36" stroke="#3C8A6D" stroke-width="2" />
  <text x="200" y="345" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="12" fill="#1B241F" data-lang="ar">مصورة (خلية بلازمية)</text>
  <text x="200" y="345" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#1B241F" data-lang="fr">Plasmocyte</text>

  <path d="M245 280 L280 265" stroke="#3B6E8F" stroke-width="2" marker-end="url(#arrowL)" />
  <g stroke="#3B6E8F" stroke-width="4" stroke-linecap="round">
    <path d="M300 250 L300 235" /><path d="M300 235 L285 218" /><path d="M300 235 L315 218" />
  </g>
  <text x="300" y="200" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="11" fill="#1B241F" data-lang="ar">أجسام مضادة</text>
  <text x="300" y="200" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="#1B241F" data-lang="fr">Anticorps</text>

  <!-- Right branch: LT -->
  <text x="600" y="120" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#204F3F" data-lang="ar">الاستجابة الخلوية</text>
  <text x="600" y="120" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#204F3F" data-lang="fr">Réponse cellulaire</text>

  <circle cx="600" cy="185" r="30" fill="#E3E8D6" stroke="#204F3F" stroke-width="2.5" />
  <text x="600" y="230" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="12" fill="#1B241F" data-lang="ar">لمفاوية تائية LT8</text>
  <text x="600" y="230" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#1B241F" data-lang="fr">Lymphocyte T8</text>

  <path d="M600 215 L600 255" stroke="#3B6E8F" stroke-width="2.5" marker-end="url(#arrowL)" />
  <text x="655" y="240" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#3B6E8F" data-lang="ar">تكاثر وتمايز</text>
  <text x="655" y="240" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#3B6E8F" data-lang="fr">Prolifération</text>

  <circle cx="600" cy="290" r="30" fill="#DCE9E1" stroke="#3C8A6D" stroke-width="2.5" />
  <g stroke="#3C8A6D" stroke-width="2.5">
    <line x1="600" y1="260" x2="600" y2="250" /><line x1="622" y1="272" x2="630" y2="264" />
    <line x1="622" y1="308" x2="630" y2="316" /><line x1="600" y1="320" x2="600" y2="330" />
    <line x1="578" y1="308" x2="570" y2="316" /><line x1="578" y1="272" x2="570" y2="264" />
  </g>
  <text x="600" y="355" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="12" fill="#1B241F" data-lang="ar">خلية تائية سامة (LTc)</text>
  <text x="600" y="355" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#1B241F" data-lang="fr">Lymphocyte T cytotoxique</text>

  <path d="M645 280 L690 260" stroke="#8B4A2B" stroke-width="2.5" marker-end="url(#arrowT)" />
  <defs>
    <marker id="arrowT" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#8B4A2B" />
    </marker>
  </defs>
  <circle cx="720" cy="245" r="24" fill="#F0F1F0" stroke="#8B4A2B" stroke-width="2.5" />
  <line x1="705" y1="230" x2="735" y2="260" stroke="#8B4A2B" stroke-width="3" />
  <line x1="735" y1="230" x2="705" y2="260" stroke="#8B4A2B" stroke-width="3" />
  <text x="720" y="290" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="11" fill="#1B241F" data-lang="ar">خلية مصابة (تُدمَّر)</text>
  <text x="720" y="290" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="#1B241F" data-lang="fr">Cellule infectée détruite</text>
</svg>

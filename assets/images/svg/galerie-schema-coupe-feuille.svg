<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="titleLeaf descLeaf">
  <title id="titleLeaf">مقطع مجهري في ورقة نبات</title>
  <desc id="descLeaf">رسم تخطيطي مبسط لمقطع عرضي في ورقة نبات يُظهر البشرة العليا والسفلى والنسيج الحشوي العمادي والإسفنجي وثغرا.</desc>
  <rect x="0" y="0" width="800" height="380" fill="#F9FAF7" />

  <!-- البشرة العليا -->
  <rect x="120" y="60" width="560" height="26" fill="#3C7A63" stroke="#204F3F" stroke-width="2" />
  <text x="700" y="78" text-anchor="end" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#1B241F" data-lang="ar">البشرة العليا</text>
  <text x="700" y="78" text-anchor="end" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#1B241F" data-lang="fr">Épiderme supérieur</text>

  <!-- النسيج الحشوي العمادي -->
  <g>
    <rect x="120" y="86" width="560" height="90" fill="#E3E8D6" stroke="#204F3F" stroke-width="1" />
    <g stroke="#204F3F" stroke-width="4">
      <line x1="150" y1="90" x2="150" y2="172" /><line x1="190" y1="90" x2="190" y2="172" />
      <line x1="230" y1="90" x2="230" y2="172" /><line x1="270" y1="90" x2="270" y2="172" />
      <line x1="310" y1="90" x2="310" y2="172" /><line x1="350" y1="90" x2="350" y2="172" />
      <line x1="390" y1="90" x2="390" y2="172" /><line x1="430" y1="90" x2="430" y2="172" />
      <line x1="470" y1="90" x2="470" y2="172" /><line x1="510" y1="90" x2="510" y2="172" />
      <line x1="550" y1="90" x2="550" y2="172" /><line x1="590" y1="90" x2="590" y2="172" />
      <line x1="630" y1="90" x2="630" y2="172" /><line x1="660" y1="90" x2="660" y2="172" />
    </g>
  </g>
  <text x="700" y="135" text-anchor="end" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#1B241F" data-lang="ar">النسيج الحشوي العمادي</text>
  <text x="700" y="135" text-anchor="end" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#1B241F" data-lang="fr">Parenchyme palissadique</text>

  <!-- النسيج الحشوي الإسفنجي -->
  <g>
    <rect x="120" y="176" width="560" height="90" fill="#F0F1F0" stroke="#3C7A63" stroke-width="1" />
    <circle cx="160" cy="205" r="16" fill="none" stroke="#3C7A63" stroke-width="3" />
    <circle cx="230" cy="235" r="14" fill="none" stroke="#3C7A63" stroke-width="3" />
    <circle cx="300" cy="200" r="15" fill="none" stroke="#3C7A63" stroke-width="3" />
    <circle cx="380" cy="240" r="17" fill="none" stroke="#3C7A63" stroke-width="3" />
    <circle cx="450" cy="205" r="14" fill="none" stroke="#3C7A63" stroke-width="3" />
    <circle cx="520" cy="235" r="16" fill="none" stroke="#3C7A63" stroke-width="3" />
    <circle cx="590" cy="200" r="15" fill="none" stroke="#3C7A63" stroke-width="3" />
    <circle cx="650" cy="240" r="14" fill="none" stroke="#3C7A63" stroke-width="3" />
  </g>
  <text x="700" y="225" text-anchor="end" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#1B241F" data-lang="ar">النسيج الحشوي الإسفنجي</text>
  <text x="700" y="225" text-anchor="end" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#1B241F" data-lang="fr">Parenchyme lacuneux</text>

  <!-- البشرة السفلى مع ثغر -->
  <rect x="120" y="266" width="560" height="26" fill="#3C7A63" stroke="#204F3F" stroke-width="2" />
  <ellipse cx="400" cy="279" rx="14" ry="7" fill="#F9FAF7" stroke="#8B4A2B" stroke-width="3" />
  <text x="700" y="285" text-anchor="end" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#1B241F" data-lang="ar">البشرة السفلى</text>
  <text x="700" y="285" text-anchor="end" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#1B241F" data-lang="fr">Épiderme inférieur</text>

  <path d="M400 292 L400 330" stroke="#8B4A2B" stroke-width="2" stroke-dasharray="4 3" />
  <text x="400" y="350" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" fill="#8B4A2B" data-lang="ar">ثغر</text>
  <text x="400" y="350" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="12" fill="#8B4A2B" data-lang="fr">Stomate</text>

  <text x="400" y="30" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="20" fill="#204F3F" data-lang="ar">مقطع عرضي في ورقة نبات</text>
  <text x="400" y="30" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="18" fill="#204F3F" data-lang="fr">Coupe transversale d'une feuille</text>
</svg>

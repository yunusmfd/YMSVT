<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="title5 desc5">
  <title id="title5">مقارنة بين الخلية الحيوانية والخلية النباتية</title>
  <desc id="desc5">رسم تخطيطي جنبا إلى جنب لخلية حيوانية بيضاوية الشكل تحتوي على نواة وميتوكوندري وغشاء هيولي، وخلية نباتية ذات جدار وفجوة عصارية وبلاستيدات خضراء بالإضافة إلى النواة والميتوكوندري.</desc>
  <rect x="0" y="0" width="800" height="380" fill="#F9FAF7" />

  <!-- الخلية الحيوانية -->
  <ellipse cx="190" cy="200" rx="150" ry="120" fill="#F0F4E8" stroke="#3B6E8F" stroke-width="3" />
  <text x="190" y="55" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="18" font-weight="bold" fill="#204F3F" data-lang="ar">الخلية الحيوانية</text>
  <text x="190" y="55" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="16" font-weight="bold" fill="#204F3F" data-lang="fr">Cellule animale</text>

  <!-- نواة -->
  <circle cx="160" cy="190" r="45" fill="#3C7A63" stroke="#204F3F" stroke-width="2.5" />
  <circle cx="160" cy="190" r="14" fill="#204F3F" />
  <text x="160" y="255" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#1B241F" data-lang="ar">النواة</text>
  <text x="160" y="255" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#1B241F" data-lang="fr">Noyau</text>

  <!-- ميتوكوندري -->
  <ellipse cx="250" cy="150" rx="22" ry="12" fill="#C17A2E" stroke="#8B4A2B" stroke-width="1.5" />
  <text x="250" y="130" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="13" fill="#8B4A2B" data-lang="ar">ميتوكوندري</text>
  <text x="250" y="130" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#8B4A2B" data-lang="fr">Mitochondrie</text>

  <text x="190" y="335" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#3B6E8F" data-lang="ar">الغشاء الهيولي</text>
  <text x="190" y="335" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#3B6E8F" data-lang="fr">Membrane plasmique</text>

  <!-- الخلية النباتية -->
  <rect x="470" y="80" width="290" height="240" rx="18" fill="#F0F4E8" stroke="#204F3F" stroke-width="4" />
  <rect x="480" y="90" width="270" height="220" rx="12" fill="none" stroke="#3B6E8F" stroke-width="2" />
  <text x="615" y="55" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="18" font-weight="bold" fill="#204F3F" data-lang="ar">الخلية النباتية</text>
  <text x="615" y="55" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="16" font-weight="bold" fill="#204F3F" data-lang="fr">Cellule végétale</text>

  <!-- فجوة عصارية -->
  <ellipse cx="670" cy="230" rx="65" ry="55" fill="#DDEBE3" stroke="#3C7A63" stroke-width="2" />
  <text x="670" y="235" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="13" fill="#1B241F" data-lang="ar">فجوة عصارية</text>
  <text x="670" y="235" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#1B241F" data-lang="fr">Vacuole</text>

  <!-- نواة -->
  <circle cx="555" cy="150" r="36" fill="#3C7A63" stroke="#204F3F" stroke-width="2.5" />
  <circle cx="555" cy="150" r="11" fill="#204F3F" />
  <text x="555" y="200" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="13" fill="#1B241F" data-lang="ar">النواة</text>
  <text x="555" y="200" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#1B241F" data-lang="fr">Noyau</text>

  <!-- بلاستيدات خضراء -->
  <ellipse cx="530" cy="260" rx="18" ry="10" fill="#3C7A63" stroke="#204F3F" stroke-width="1.5" />
  <ellipse cx="560" cy="285" rx="18" ry="10" fill="#3C7A63" stroke="#204F3F" stroke-width="1.5" />
  <text x="500" y="300" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="13" fill="#204F3F" data-lang="ar">بلاستيدات خضراء</text>
  <text x="500" y="315" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#204F3F" data-lang="fr">Chloroplastes</text>

  <!-- ميتوكوندري -->
  <ellipse cx="620" cy="120" rx="18" ry="10" fill="#C17A2E" stroke="#8B4A2B" stroke-width="1.5" />
  <text x="700" y="115" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="12" fill="#8B4A2B" data-lang="ar">ميتوكوندري</text>
  <text x="700" y="115" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="#8B4A2B" data-lang="fr">Mitochondrie</text>

  <text x="615" y="340" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#204F3F" data-lang="ar">جدار الخلية (الخط الخارجي)</text>
  <text x="615" y="355" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#204F3F" data-lang="fr">Paroi pecto-cellulosique (contour externe)</text>
</svg>

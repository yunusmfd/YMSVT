<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="titleCel descCel">
  <title id="titleCel">خريطة ذهنية: عضيات الخلية</title>
  <desc id="descCel">خريطة ذهنية بسيطة تربط مفهوم الخلية المركزي بأهم عضياتها: النواة والميتوكوندري والغشاء الهيولي والريبوزومات.</desc>
  <rect x="0" y="0" width="800" height="380" fill="#F9FAF7" />

  <g stroke="#DADDD5" stroke-width="3" fill="none">
    <line x1="400" y1="190" x2="150" y2="80" />
    <line x1="400" y1="190" x2="650" y2="80" />
    <line x1="400" y1="190" x2="150" y2="300" />
    <line x1="400" y1="190" x2="650" y2="300" />
  </g>

  <ellipse cx="400" cy="190" rx="95" ry="48" fill="#204F3F" stroke="#1B241F" stroke-width="3" />
  <text x="400" y="184" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="20" fill="#F9FAF7" data-lang="ar">الخلية</text>
  <text x="400" y="208" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="#F9FAF7" data-lang="fr">La cellule</text>

  <ellipse cx="150" cy="80" rx="110" ry="38" fill="#3C7A63" stroke="#204F3F" stroke-width="2" />
  <text x="150" y="75" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#F9FAF7" data-lang="ar">النواة</text>
  <text x="150" y="95" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#F9FAF7" data-lang="fr">Noyau</text>

  <ellipse cx="650" cy="80" rx="110" ry="38" fill="#3B6E8F" stroke="#204F3F" stroke-width="2" />
  <text x="650" y="75" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#F9FAF7" data-lang="ar">الميتوكوندري</text>
  <text x="650" y="95" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#F9FAF7" data-lang="fr">Mitochondrie</text>

  <ellipse cx="150" cy="300" rx="110" ry="38" fill="#C17A2E" stroke="#8B4A2B" stroke-width="2" />
  <text x="150" y="295" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#F9FAF7" data-lang="ar">الغشاء الهيولي</text>
  <text x="150" y="315" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#F9FAF7" data-lang="fr">Membrane plasmique</text>

  <ellipse cx="650" cy="300" rx="110" ry="38" fill="#8B4A2B" stroke="#1B241F" stroke-width="2" />
  <text x="650" y="295" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#F9FAF7" data-lang="ar">الريبوزومات</text>
  <text x="650" y="315" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#F9FAF7" data-lang="fr">Ribosomes</text>
</svg>

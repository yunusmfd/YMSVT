<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="title2 desc2">
  <title id="title2">نوعا الأمواج الزلزالية P وS</title>
  <desc id="desc2">رسم تخطيطي يقارن بين الموجة الأولية P ذات الحركة الاهتزازية في اتجاه الانتشار، والموجة الثانوية S ذات الحركة الاهتزازية العمودية على اتجاه الانتشار.</desc>
  <rect x="0" y="0" width="800" height="380" fill="#F9FAF7" />

  <!-- منطقة الموجة P -->
  <rect x="40" y="40" width="720" height="140" rx="10" fill="#E3E8D6" stroke="#3C7A63" stroke-width="2" />
  <text x="70" y="70" font-family="IBM Plex Sans Arabic, sans-serif" font-size="18" font-weight="bold" fill="#204F3F" data-lang="ar">الموجة P (الأولية) — اهتزاز في اتجاه الانتشار</text>
  <text x="70" y="70" font-family="IBM Plex Sans, sans-serif" font-size="16" font-weight="bold" fill="#204F3F" data-lang="fr">Onde P (primaire) — vibration dans le sens de propagation</text>

  <!-- تمثيل موجة P كخطوط متقاربة/متباعدة (ضغط وتمدد) -->
  <g stroke="#3B6E8F" stroke-width="3">
    <line x1="90" y1="110" x2="90" y2="160" />
    <line x1="110" y1="110" x2="110" y2="160" />
    <line x1="140" y1="110" x2="140" y2="160" />
    <line x1="220" y1="110" x2="220" y2="160" />
    <line x1="330" y1="110" x2="330" y2="160" />
    <line x1="350" y1="110" x2="350" y2="160" />
    <line x1="380" y1="110" x2="380" y2="160" />
    <line x1="460" y1="110" x2="460" y2="160" />
    <line x1="570" y1="110" x2="570" y2="160" />
    <line x1="590" y1="110" x2="590" y2="160" />
    <line x1="620" y1="110" x2="620" y2="160" />
  </g>
  <path d="M 70 135 L 700 135" stroke="#8B4A2B" stroke-width="2.5" marker-end="url(#arrowP)" opacity="0.7" />
  <defs>
    <marker id="arrowP" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8B4A2B" />
    </marker>
  </defs>
  <text x="710" y="140" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#8B4A2B" data-lang="ar">اتجاه الانتشار</text>
  <text x="710" y="140" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#8B4A2B" data-lang="fr">Propagation</text>

  <!-- منطقة الموجة S -->
  <rect x="40" y="200" width="720" height="140" rx="10" fill="#E3E8D6" stroke="#3C7A63" stroke-width="2" />
  <text x="70" y="230" font-family="IBM Plex Sans Arabic, sans-serif" font-size="18" font-weight="bold" fill="#204F3F" data-lang="ar">الموجة S (الثانوية) — اهتزاز عمودي على اتجاه الانتشار</text>
  <text x="70" y="230" font-family="IBM Plex Sans, sans-serif" font-size="16" font-weight="bold" fill="#204F3F" data-lang="fr">Onde S (secondaire) — vibration perpendiculaire</text>

  <path d="M 70 300 Q 130 250 190 300 T 310 300 T 430 300 T 550 300 T 670 300" stroke="#3B6E8F" stroke-width="3.5" fill="none" />
  <path d="M 70 300 L 700 300" stroke="#8B4A2B" stroke-width="2" stroke-dasharray="4 4" opacity="0.6" />
  <path d="M 610 300 L 700 300" stroke="#8B4A2B" stroke-width="2.5" marker-end="url(#arrowS)" opacity="0.7" />
  <defs>
    <marker id="arrowS" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8B4A2B" />
    </marker>
  </defs>
  <text x="710" y="305" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#8B4A2B" data-lang="ar">اتجاه الانتشار</text>
  <text x="710" y="305" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#8B4A2B" data-lang="fr">Propagation</text>

  <text x="400" y="370" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" fill="#1B241F" data-lang="ar">الموجة P أسرع وتصل أولا، والموجة S أبطأ لكنها أشد تخريبا</text>
  <text x="400" y="370" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="13" fill="#1B241F" data-lang="fr">L'onde P est plus rapide (arrive en premier), l'onde S est plus lente mais plus destructrice</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-labelledby="title2 desc2">
  <title id="title2">الانقسامان المتتاليان للانقسام المنصف</title>
  <desc id="desc2">خلية أم واحدة (2n) تمر بانقسامين متتاليين لتعطي في النهاية 4 خلايا أحادية الصيغة الصبغية (n).</desc>
  <rect x="0" y="0" width="800" height="320" fill="#F9FAF7" />

  <circle cx="90" cy="160" r="60" fill="#F0F1F0" stroke="#204F3F" stroke-width="3" />
  <text x="90" y="240" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="15" fill="#1B241F" data-lang="ar">خلية أم (2n)</text>
  <text x="90" y="240" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="#1B241F" data-lang="fr">Cellule mère (2n)</text>

  <path d="M160 160 L220 160" stroke="#8B4A2B" stroke-width="3" marker-end="url(#arrow2)" />
  <text x="190" y="145" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#8B4A2B" data-lang="ar">انقسام I</text>
  <text x="190" y="145" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#8B4A2B" data-lang="fr">Division I</text>

  <circle cx="290" cy="110" r="42" fill="#E3E8D6" stroke="#3C7A63" stroke-width="2.5" />
  <circle cx="290" cy="210" r="42" fill="#E3E8D6" stroke="#3C7A63" stroke-width="2.5" />
  <text x="290" y="270" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="14" fill="#1B241F" data-lang="ar">خليتان (n)</text>
  <text x="290" y="270" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#1B241F" data-lang="fr">Deux cellules (n)</text>

  <path d="M335 110 L400 90" stroke="#8B4A2B" stroke-width="2.5" marker-end="url(#arrow2)" />
  <path d="M335 210 L400 230" stroke="#8B4A2B" stroke-width="2.5" marker-end="url(#arrow2)" />
  <text x="370" y="75" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#8B4A2B" data-lang="ar">انقسام II</text>
  <text x="370" y="75" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#8B4A2B" data-lang="fr">Division II</text>

  <defs>
    <marker id="arrow2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#8B4A2B" />
    </marker>
  </defs>

  <g>
    <circle cx="450" cy="60" r="32" fill="#DCE9E1" stroke="#3C8A6D" stroke-width="2" />
    <circle cx="450" cy="130" r="32" fill="#DCE9E1" stroke="#3C8A6D" stroke-width="2" />
    <circle cx="450" cy="200" r="32" fill="#DCE9E1" stroke="#3C8A6D" stroke-width="2" />
    <circle cx="450" cy="270" r="32" fill="#DCE9E1" stroke="#3C8A6D" stroke-width="2" />
  </g>
  <text x="450" y="310" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#1B241F" data-lang="ar">4 أمشاج (n) — أحادية الصيغة الصبغية</text>
  <text x="450" y="310" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#1B241F" data-lang="fr">4 gamètes (n) — haploïdes</text>

  <g stroke="#C17A2E" stroke-width="2" fill="none">
    <path d="M580 60 h180" /><path d="M580 130 h180" /><path d="M580 200 h180" /><path d="M580 270 h180" />
  </g>
  <text x="670" y="30" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="12" fill="#C17A2E" data-lang="ar">تنوّع وراثي في كل مشيج</text>
  <text x="670" y="30" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C17A2E" data-lang="fr">Diversité génétique par gamète</text>
</svg>

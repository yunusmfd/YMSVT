<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="title4 desc4">
  <title id="title4">مخطط عملية التركيب الضوئي</title>
  <desc id="desc4">مخطط يبين المدخلات (ثاني أكسيد الكربون والماء والطاقة الضوئية) تدخل إلى البلاستيدة الخضراء وتُنتج مخرجات (المادة العضوية غلوكوز وثاني الأكسجين).</desc>
  <rect x="0" y="0" width="800" height="380" fill="#F9FAF7" />

  <!-- مدخلات -->
  <rect x="30" y="60" width="180" height="60" rx="8" fill="#E3E8D6" stroke="#3B6E8F" stroke-width="2" />
  <text x="120" y="95" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="17" fill="#1B241F" data-lang="ar">ثاني أكسيد الكربون CO₂</text>
  <text x="120" y="95" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="#1B241F" data-lang="fr">Dioxyde de carbone CO₂</text>

  <rect x="30" y="150" width="180" height="60" rx="8" fill="#E3E8D6" stroke="#3B6E8F" stroke-width="2" />
  <text x="120" y="185" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="17" fill="#1B241F" data-lang="ar">الماء H₂O</text>
  <text x="120" y="185" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#1B241F" data-lang="fr">Eau H₂O</text>

  <rect x="30" y="240" width="180" height="60" rx="8" fill="#F5E3C6" stroke="#C17A2E" stroke-width="2" />
  <text x="120" y="275" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="17" fill="#1B241F" data-lang="ar">الطاقة الضوئية</text>
  <text x="120" y="275" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#1B241F" data-lang="fr">Lumière solaire</text>

  <!-- أسهم نحو البلاستيدة -->
  <path d="M 210 90 L 300 175" stroke="#3B6E8F" stroke-width="2.5" marker-end="url(#a1)" fill="none" />
  <path d="M 210 180 L 300 185" stroke="#3B6E8F" stroke-width="2.5" marker-end="url(#a1)" fill="none" />
  <path d="M 210 270 L 300 195" stroke="#C17A2E" stroke-width="2.5" marker-end="url(#a2)" fill="none" />
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#3B6E8F" /></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#C17A2E" /></marker>
    <marker id="a3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#204F3F" /></marker>
  </defs>

  <!-- البلاستيدة الخضراء -->
  <ellipse cx="400" cy="190" rx="90" ry="65" fill="#3C7A63" stroke="#204F3F" stroke-width="3" />
  <ellipse cx="400" cy="190" rx="60" ry="40" fill="none" stroke="#204F3F" stroke-width="2" opacity="0.6" />
  <text x="400" y="185" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="17" fill="#F9FAF7" data-lang="ar">البلاستيدة الخضراء</text>
  <text x="400" y="185" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="#F9FAF7" data-lang="fr">Chloroplaste</text>
  <text x="400" y="210" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="12" fill="#E3E8D6" data-lang="ar">(اليخضور)</text>
  <text x="400" y="210" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#E3E8D6" data-lang="fr">(chlorophylle)</text>

  <!-- أسهم نحو المخرجات -->
  <path d="M 490 165 L 590 100" stroke="#204F3F" stroke-width="2.5" marker-end="url(#a3)" fill="none" />
  <path d="M 490 210 L 590 260" stroke="#204F3F" stroke-width="2.5" marker-end="url(#a3)" fill="none" />

  <!-- مخرجات -->
  <rect x="590" y="70" width="180" height="60" rx="8" fill="#DDEBE3" stroke="#204F3F" stroke-width="2" />
  <text x="680" y="105" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="17" fill="#1B241F" data-lang="ar">المادة العضوية (غلوكوز)</text>
  <text x="680" y="105" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="#1B241F" data-lang="fr">Matière organique (glucose)</text>

  <rect x="590" y="230" width="180" height="60" rx="8" fill="#DDEBE3" stroke="#204F3F" stroke-width="2" />
  <text x="680" y="265" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="17" fill="#1B241F" data-lang="ar">ثاني الأكسجين O₂</text>
  <text x="680" y="265" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#1B241F" data-lang="fr">Dioxygène O₂</text>

  <text x="400" y="345" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="15" fill="#1B241F" data-lang="ar">CO₂ + H₂O + ضوء ← غلوكوز + O₂</text>
  <text x="400" y="345" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" fill="#1B241F" data-lang="fr">CO₂ + H₂O + lumière → glucose + O₂</text>
</svg>

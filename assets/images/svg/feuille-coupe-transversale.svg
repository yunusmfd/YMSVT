<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="title3 desc3">
  <title id="title3">مقطع مجهري في ورقة نبات</title>
  <desc id="desc3">رسم تخطيطي لمقطع عرضي في ورقة نبات يبين البشرة العليا والسفلى، والخلايا الوسطى المحتوية على البلاستيدات الخضراء، وثغرا على السطح السفلي يتبادل ثاني أكسيد الكربون والأكسجين، مع أسهم لدخول ضوء الشمس.</desc>
  <rect x="0" y="0" width="800" height="380" fill="#F9FAF7" />

  <!-- البشرة العليا -->
  <rect x="60" y="60" width="680" height="24" fill="#DADDD5" stroke="#204F3F" stroke-width="2" />
  <text x="70" y="45" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#204F3F" data-lang="ar">البشرة العليا</text>
  <text x="70" y="45" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#204F3F" data-lang="fr">Épiderme supérieur</text>

  <!-- خلايا وسطى تحتوي على بلاستيدات -->
  <rect x="60" y="84" width="680" height="150" fill="#F0F4E8" stroke="#3C7A63" stroke-width="1.5" />
  <g>
    <!-- صفوف من الخلايا مع بلاستيدات خضراء -->
    <g id="row1">
      <circle cx="110" cy="130" r="6" fill="#3C7A63" /><circle cx="130" cy="135" r="6" fill="#3C7A63" /><circle cx="150" cy="128" r="6" fill="#3C7A63" />
      <circle cx="230" cy="130" r="6" fill="#3C7A63" /><circle cx="250" cy="135" r="6" fill="#3C7A63" /><circle cx="270" cy="128" r="6" fill="#3C7A63" />
      <circle cx="350" cy="130" r="6" fill="#3C7A63" /><circle cx="370" cy="135" r="6" fill="#3C7A63" /><circle cx="390" cy="128" r="6" fill="#3C7A63" />
      <circle cx="470" cy="130" r="6" fill="#3C7A63" /><circle cx="490" cy="135" r="6" fill="#3C7A63" /><circle cx="510" cy="128" r="6" fill="#3C7A63" />
      <circle cx="590" cy="130" r="6" fill="#3C7A63" /><circle cx="610" cy="135" r="6" fill="#3C7A63" /><circle cx="630" cy="128" r="6" fill="#3C7A63" />
      <circle cx="680" cy="130" r="6" fill="#3C7A63" /><circle cx="700" cy="135" r="6" fill="#3C7A63" />
    </g>
    <g id="row2">
      <circle cx="120" cy="190" r="6" fill="#3C7A63" /><circle cx="145" cy="195" r="6" fill="#3C7A63" /><circle cx="170" cy="188" r="6" fill="#3C7A63" />
      <circle cx="260" cy="190" r="6" fill="#3C7A63" /><circle cx="285" cy="195" r="6" fill="#3C7A63" /><circle cx="310" cy="188" r="6" fill="#3C7A63" />
      <circle cx="400" cy="190" r="6" fill="#3C7A63" /><circle cx="425" cy="195" r="6" fill="#3C7A63" /><circle cx="450" cy="188" r="6" fill="#3C7A63" />
      <circle cx="540" cy="190" r="6" fill="#3C7A63" /><circle cx="565" cy="195" r="6" fill="#3C7A63" /><circle cx="590" cy="188" r="6" fill="#3C7A63" />
      <circle cx="660" cy="190" r="6" fill="#3C7A63" /><circle cx="685" cy="195" r="6" fill="#3C7A63" />
    </g>
  </g>
  <text x="600" y="105" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#204F3F" data-lang="ar">خلايا تحتوي على البلاستيدات الخضراء</text>
  <text x="600" y="105" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="#204F3F" data-lang="fr">Cellules à chloroplastes</text>

  <!-- البشرة السفلى -->
  <rect x="60" y="234" width="680" height="24" fill="#DADDD5" stroke="#204F3F" stroke-width="2" />
  <!-- ثغر -->
  <ellipse cx="400" cy="246" rx="16" ry="9" fill="#F9FAF7" stroke="#8B4A2B" stroke-width="2.5" />
  <text x="330" y="290" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#8B4A2B" data-lang="ar">ثغر (تبادل الغازات)</text>
  <text x="330" y="290" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#8B4A2B" data-lang="fr">Stomate (échanges gazeux)</text>

  <!-- أسهم دخول ثاني أكسيد الكربون -->
  <path d="M 400 340 L 400 262" stroke="#3B6E8F" stroke-width="3" marker-end="url(#arrowIn)" />
  <defs>
    <marker id="arrowIn" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3B6E8F" />
    </marker>
  </defs>
  <text x="410" y="330" font-family="IBM Plex Sans Arabic, sans-serif" font-size="15" fill="#3B6E8F" data-lang="ar">CO₂ يدخل</text>
  <text x="410" y="330" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="#3B6E8F" data-lang="fr">Entrée de CO₂</text>

  <!-- أسهم ضوء الشمس -->
  <g stroke="#C17A2E" stroke-width="3">
    <path d="M 150 15 L 130 55" marker-end="url(#arrowLight)" />
    <path d="M 400 15 L 400 55" marker-end="url(#arrowLight)" />
    <path d="M 650 15 L 670 55" marker-end="url(#arrowLight)" />
  </g>
  <defs>
    <marker id="arrowLight" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#C17A2E" />
    </marker>
  </defs>
  <text x="440" y="25" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#C17A2E" data-lang="ar">الطاقة الضوئية</text>
  <text x="440" y="25" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#C17A2E" data-lang="fr">Lumière solaire</text>
</svg>

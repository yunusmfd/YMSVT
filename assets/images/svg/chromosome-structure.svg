<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="tCh dCh">
  <title id="tCh">بنية الصبغي</title>
  <desc id="dCh">صبغي مضاعف مكوّن من كروماتيدتين شقيقتين متّصلتين عند الجزء المركزي، وتفصيل يبيّن أن الصبغين يتكوّن من ADN ملتفّ.</desc>
  <rect width="800" height="380" fill="#F9FAF7"/>

  <!-- الصبغي المضاعف: كروماتيدتان -->
  <g fill="#3B6E8F" stroke="#204F3F" stroke-width="2">
    <path d="M235 70 q-26 60 0 120 q-26 60 0 120 q22 -14 22 -40 q-16 -70 0 -140 q0 -30 -22 -60 z"/>
    <path d="M285 70 q26 60 0 120 q26 60 0 120 q-22 -14 -22 -40 q16 -70 0 -140 q0 -30 22 -60 z"/>
  </g>
  <!-- المركزين (الجزء المركزي) -->
  <ellipse cx="260" cy="190" rx="34" ry="14" fill="#C17A2E"/>
  <line x1="205" y1="190" x2="235" y2="190" stroke="#8B4A2B" stroke-width="3"/>
  <line x1="285" y1="190" x2="315" y2="190" stroke="#8B4A2B" stroke-width="3"/>

  <text x="150" y="120" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#1B241F" data-lang="ar">كروماتيدة</text>
  <text x="150" y="120" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="#1B241F" data-lang="fr">Chromatide</text>
  <text x="405" y="196" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="16" fill="#C17A2E" data-lang="ar">المركزين (Centromère)</text>
  <text x="405" y="196" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="#C17A2E" data-lang="fr">Centromère</text>

  <!-- سهم للتفصيل -->
  <path d="M310 260 L470 300" stroke="#8B4A2B" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arCh)"/>
  <defs><marker id="arCh" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#8B4A2B"/></marker></defs>

  <!-- تفصيل: ADN ملتفّ -->
  <g stroke="#204F3F" stroke-width="3" fill="none">
    <path d="M500 300 q20 -18 40 0 t40 0 t40 0 t40 0"/>
    <path d="M500 320 q20 18 40 0 t40 0 t40 0 t40 0"/>
  </g>
  <text x="620" y="345" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="15" fill="#204F3F" data-lang="ar">جزيء ADN (يحمل المورثات)</text>
  <text x="620" y="345" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#204F3F" data-lang="fr">Molécule d'ADN (porte les gènes)</text>
</svg>
